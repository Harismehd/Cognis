<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognis | ML Observability Dashboard</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: #141417;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --border: #27272a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 14px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem 2rem;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.025em; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); display: inline-block; margin-right: 8px; }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1px;
            background: var(--border);
            overflow: hidden;
        }

        section { background: var(--bg-dark); overflow: hidden; display: flex; flex-direction: column; }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 1rem;
            gap: 1rem;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
        }

        .stat-card {
            padding: 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .stat-card label { display: block; color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .feed-container { flex: 1; overflow-y: auto; padding: 0 1rem; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { position: sticky; top: 0; background: var(--bg-dark); padding: 1rem 0.5rem; color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }

        .badge { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .badge-hint { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .badge-warning { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        .badge-silence { background: rgba(156, 163, 175, 0.2); color: var(--text-secondary); }

        .conf-high { color: var(--accent-green); }
        .conf-mid { color: var(--accent-yellow); }
        .conf-low { color: var(--accent-red); }

        aside { background: var(--panel-bg); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; border-left: 1px solid var(--border); }
        h2 { font-size: 0.85rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 1rem; }

        .health-grid { display: grid; gap: 1rem; }
        .health-item { display: flex; justify-content: space-between; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .health-item span:first-child { color: var(--text-secondary); }

        .alert-item {
            padding: 1rem;
            border-radius: 8px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: var(--accent-yellow);
            margin-bottom: 0.5rem;
        }

        .alert-critical {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>COGNIS <span style="color: var(--text-secondary); font-weight: 300;">// INFERENCE ENGINE</span></h1>
    <div>
        <span class="status-dot"></span>
        <span id="uptime-display">UPTIME: 00:00:00</span>
    </div>
</header>

<main>
    <section>
        <div class="stats-bar">
            <div class="stat-card">
                <label>Total Predictions</label>
                <div class="value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <label>P95 Latency</label>
                <div class="value" id="stat-latency">0ms</div>
            </div>
            <div class="stat-card">
                <label>Intervention Rate</label>
                <div class="value" id="stat-rate">0.0%</div>
            </div>
            <div class="stat-card">
                <label>Active Students</label>
                <div class="value" id="stat-students">0</div>
            </div>
        </div>

        <div class="feed-container">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Student</th>
                        <th>Diagnostic</th>
                        <th>Conf</th>
                        <th>Type</th>
                        <th>Latency</th>
                    </tr>
                </thead>
                <tbody id="feed-body">
                    <!-- Rows injected here -->
                </tbody>
            </table>
        </div>
    </section>

    <aside>
        <div>
            <h2>Model Health</h2>
            <div class="health-grid">
                <div class="health-item"><span>Version</span><span id="health-version">v1.2</span></div>
                <div class="health-item"><span>Memory</span><span id="health-memory">0MB</span></div>
                <div class="health-item"><span>Model Size</span><span id="health-size">8.5MB</span></div>
                <div class="health-item"><span>Retrain Signals</span><span id="health-signals">0</span></div>
            </div>
        </div>

        <div>
            <h2>Active Alerts</h2>
            <div id="alerts-container">
                <div class="alert-item" style="background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); color: var(--accent-green);">
                    System running optimally.
                </div>
            </div>
        </div>
    </aside>
</main>

<script>
    async function updateDashboard() {
        try {
            // 1. Fetch Stats
            const statsRes = await fetch('/dashboard/stats');
            const stats = await statsRes.json();
            
            document.getElementById('stat-total').innerText = stats.today.total_predictions;
            document.getElementById('stat-latency').innerText = stats.p95_latency + 'ms';
            document.getElementById('stat-rate').innerText = stats.intervention_rate + '%';
            document.getElementById('stat-students').innerText = stats.active_students;

            // 2. Fetch Recent Inference
            const recentRes = await fetch('/dashboard/recent');
            const recent = await recentRes.json();
            
            const tbody = document.getElementById('feed-body');
            tbody.innerHTML = recent.map(r => `
                <tr>
                    <td>${r.timestamp}</td>
                    <td>${r.student_id.substring(0,8)}...</td>
                    <td>${r.error_type}</td>
                    <td class="${r.confidence > 0.8 ? 'conf-high' : r.confidence > 0.6 ? 'conf-mid' : 'conf-low'}">${(r.confidence * 100).toFixed(0)}%</td>
                    <td><span class="badge badge-${r.intervention}">${r.intervention}</span></td>
                    <td>${r.latency}ms</td>
                </tr>
            `).join('');

            // 3. Fetch Health
            const healthRes = await fetch('/dashboard/model-health');
            const health = await healthRes.json();
            document.getElementById('health-memory').innerText = health.memory_mb + 'MB';
            document.getElementById('health-signals').innerText = health.collecting_for_retrain;
            document.getElementById('uptime-display').innerText = 'UPTIME: ' + health.uptime.split('.')[0];

            // 4. Alert Logic (Simple client-side thresholds)
            const alertsDiv = document.getElementById('alerts-container');
            let alerts = [];
            if (stats.p95_latency > 100) alerts.push({type: 'warning', msg: 'High Latency Detected'});
            if (health.memory_mb > 500) alerts.push({type: 'critical', msg: 'Memory Usage Spike'});
            
            if (alerts.length > 0) {
                alertsDiv.innerHTML = alerts.map(a => `
                    <div class="alert-item ${a.type === 'critical' ? 'alert-critical' : ''}">
                        ${a.msg}
                    </div>
                `).join('');
            }

        } catch (e) {
            console.error("Dashboard Sync Failed", e);
        }
    }

    // Refresh every 2 seconds
    setInterval(updateDashboard, 2000);
    updateDashboard();
</script>

</body>
</html>
